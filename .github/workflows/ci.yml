name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "docker-compose*.yml"
      - ".github/workflows/**"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # required for SARIF upload

    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Build and start services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml \
            up -d --build --wait

      - name: Run lint
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml \
            exec -T app npm run lint

      # Dependency scan — blocks on HIGH or CRITICAL only.
      # Results also uploaded to GitHub Security tab as SARIF.
      - name: Snyk — dependency scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --severity-threshold=high
            --sarif-file-output=snyk-deps.sarif
          command: test

      - name: Upload dependency scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-deps

      - name: Run tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml \
            exec -T app npm test

      - name: Run coverage
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml \
            exec -T app npm run coverage

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build and push image to GHCR
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./app
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:pr-${{ github.event.number || github.run_id }}

      - name: Tear down
        if: always()
        run: docker compose down -v
