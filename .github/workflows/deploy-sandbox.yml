name: Deploy Sandbox

on:
  push:
    branches: [staging]
    paths:
      - "app/**"
      - "docker-stack.yml"
      - "nginx/**"
      - ".github/workflows/deploy-sandbox.yml"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build and push (arm64 only)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ./app
          target: production
          push: true
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE }}:staging-latest
            ${{ env.IMAGE }}:staging-${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy nginx config to VM
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345
        with:
          host: ${{ secrets.SANDBOX_HOST }}
          username: ubuntu
          key: ${{ secrets.SANDBOX_SSH_KEY }}
          source: "nginx/nginx.conf"
          target: "~/myapp/"
          strip_components: 0

      - name: Copy stack file to VM
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345
        with:
          host: ${{ secrets.SANDBOX_HOST }}
          username: ubuntu
          key: ${{ secrets.SANDBOX_SSH_KEY }}
          source: "docker-stack.yml"
          target: "~/myapp/"
          strip_components: 0

      - name: Deploy Swarm stack
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.SANDBOX_HOST }}
          username: ubuntu
          key: ${{ secrets.SANDBOX_SSH_KEY }}
          script: |
            cd ~/myapp
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            GITHUB_REPOSITORY=${{ github.repository }} TAG=staging-${{ github.sha }} \
              docker stack deploy -c docker-stack.yml myapp --with-registry-auth
            docker image prune -f
