version: "3.8"

services:
  app:
    image: ${IMAGE:-your-org/myapp}:${TAG:-latest}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-myapp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-myapp}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    depends_on:
      - db
    secrets:
      - postgres_password
      - postgres_user
      - postgres_db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user)"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    secrets:
      - postgres_password
      - postgres_user
      - postgres_db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

secrets:
  postgres_user:
    external: true
  postgres_password:
    external: true
  postgres_db:
    external: true

volumes:
  db_data:
    driver: local
